services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${API_IMAGE}
    container_name: jarvis-api
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GMAIL_TOKEN_FILE: /data/token.json
      GMAIL_CREDENTIALS_FILE: /data/credentials.json
      GOOGLE_OAUTH_BASE_URL: ${GOOGLE_OAUTH_BASE_URL:-}
      JOURNAL_DB: /data/journal_entries.db
      TASKS_DB: /data/tasks.db
      HEALTH_DB: /data/health.db
      MOVEMENT_DB: /data/movement.db
      WORKOUT_DB: /data/workouts.db
      ASSISTANT_CHAT_DB: /data/assistant_chat.db
      LANGUAGE_DB: /data/language_learning.db
      CLASSIFICATION_CACHE_DB: /data/classification_cache.db
      CLASSIFICATION_GUIDANCE_FILE: /data/classification_guidance.json
      OPENAI_MAX_EMAILS_PER_RUN: ${OPENAI_MAX_EMAILS_PER_RUN:-15}
      OPENAI_EMAIL_BODY_PREVIEW_CHARS: ${OPENAI_EMAIL_BODY_PREVIEW_CHARS:-0}
      OPENAI_LANGUAGE_MODEL: ${OPENAI_LANGUAGE_MODEL:-gpt-4.1-mini}
      OPENAI_LANGUAGE_MAX_TOKENS: ${OPENAI_LANGUAGE_MAX_TOKENS:-1400}
      OPENAI_TRANSCRIPTION_MODEL: ${OPENAI_TRANSCRIPTION_MODEL:-gpt-4o-mini-transcribe}
      OPENAI_TTS_MODEL: ${OPENAI_TTS_MODEL:-gpt-4o-mini-tts}
      OPENAI_TTS_VOICE: ${OPENAI_TTS_VOICE:-cedar}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      OVERPASS_API_URLS: ${OVERPASS_API_URLS:-}
      OVERPASS_API_URL: ${OVERPASS_API_URL:-}
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  web:
    build:
      context: ./jarvis-ui
      dockerfile: Dockerfile
    image: ${WEB_IMAGE}
    container_name: jarvis-web
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-/api}
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://api:8000}
      NEXT_PUBLIC_CESIUM_ION_TOKEN: ${NEXT_PUBLIC_CESIUM_ION_TOKEN:-}
      NEXT_PUBLIC_CESIUM_TERRAIN_URL: ${NEXT_PUBLIC_CESIUM_TERRAIN_URL:-}
      CESIUM_ION_TOKEN: ${NEXT_PUBLIC_CESIUM_ION_TOKEN:-}
      CESIUM_TERRAIN_URL: ${NEXT_PUBLIC_CESIUM_TERRAIN_URL:-}
      STADIA_MAPS_API_KEY: ${STADIA_MAPS_API_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped
